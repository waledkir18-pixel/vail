<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-[#FBF9F6] flex items-center justify-center min-h-screen py-10">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-neutral-100 w-full max-w-md m-4">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-neutral-800">حساب جديد</h1>
            <p class="text-neutral-500 mt-2 text-sm">أنشئي حسابكِ لتجربة تفصيل مخصصة ومريحة</p>
        </div>

        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-neutral-600 mb-1">الاسم الكامل</label>
                <input type="text" name="full_name" required class="w-full px-4 py-2 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-1 focus:ring-amber-600 outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-neutral-600 mb-1">رقم الجوال</label>
                <input type="tel" name="phone" placeholder="05xxxxxxxx" required class="w-full px-4 py-2 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-1 focus:ring-amber-600 outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-neutral-600 mb-1">العمر</label>
                <input type="number" name="age" required class="w-full px-4 py-2 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-1 focus:ring-amber-600 outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-neutral-600 mb-1">البريد الإلكتروني</label>
                <input type="email" name="email" required class="w-full px-4 py-2 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-1 focus:ring-amber-600 outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-neutral-600 mb-1">كلمة السر</label>
                <input type="password" name="password" required class="w-full px-4 py-2 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-1 focus:ring-amber-600 outline-none">
            </div>
            <button type="submit" class="w-full bg-neutral-900 text-white py-3 rounded-xl font-bold hover:bg-neutral-800 transition">إنشاء الحساب</button>
        </form>
        <div class="text-center mt-6">
            <p class="text-sm text-neutral-500">لديكِ حساب بالفعل؟ <a href="/login" class="text-amber-700 font-bold hover:underline">تسجيل الدخول</a></p>
        </div>
    </div>
</body>
</html>
