<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-[#FBF9F6] flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-neutral-100 w-full max-w-md m-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-neutral-800 tracking-wide">مَـتْ//ـجَـر الـعَـبَ//ـايَـات</h1>
            <p class="text-neutral-500 mt-2 text-sm">مرحباً بكِ في عالم الأناقة الفاخرة</p>
        </div>
        
        <!-- رسائل النظام (خطأ أو نجاح) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="p-3 mb-4 text-sm rounded-lg text-center {% if category == 'error' %}bg-red-50 text-red-600{% else %}bg-green-50 text-green-600{% endif %}">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-neutral-600 mb-1">رقم الجوال</label>
                <input type="tel" name="phone" placeholder="05xxxxxxxx" required class="w-full px-4 py-2.5 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-1 focus:ring-amber-600 outline-none text-right">
            </div>
            <div>
                <label class="block text-xs font-medium text-neutral-600 mb-1">كلمة السر</label>
                <input type="password" name="password" required class="w-full px-4 py-2.5 bg-neutral-50 border border-neutral-200 rounded-xl focus:ring-1 focus:ring-amber-600 outline-none text-right">
            </div>
            <button type="submit" class="w-full bg-neutral-900 text-white py-3 rounded-xl font-bold hover:bg-neutral-800 transition shadow-sm">تسجيل الدخول</button>
        </form>
        <div class="text-center mt-6">
            <p class="text-sm text-neutral-500">ليس لديكِ حساب؟ <a href="/register" class="text-amber-700 font-bold hover:underline">إنشاء حساب جديد</a></p>
        </div>
    </div>
</body>
</html>
